<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashSaúde</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="modal-login" class="modal-overlay">
        <div class="modal-conteudo">
            <span id="fechar-modal" class="fechar-modal">&#10005</span>
            <h2>Login</h2>
            <form id="form-login">
                <label for="email">E-mail</label>
                <input type="email" id ="email" placeholder ="Digite o seu e-mail">
                <span id="erro-email" class ="erro-msg"></span>

                <label for ="senha">Senha</label>
                <input type ="password" id ="senha" placeholder="Digite a sua senha">
                <span id ="erro-senha" class ="erro-msg"></span>

                <div class = "botoes-modal">
                    <button type ="button" id ="bnt-Cancelar">Cancelar</button>
                    <button type ="submit" id ="bnt-Login">Login</button>
                </div>
            </form>
        </div>
    </div>
  </body>
</html>
